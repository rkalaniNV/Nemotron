# AutoModel pretraining defaults.

recipe: TrainPretrainRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 64
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: 500
  max_steps: 10000

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  trust_remote_code: true

# Set load_weights=false for from-scratch pretraining.
load_weights: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: true

checkpoint:
  enabled: true
  checkpoint_dir: ./checkpoints/pretrain
  model_save_format: safetensors
  save_consolidated: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# Pretraining consumes bin/idx tokenized data; HF dataset compat: switch _target_ to a HF text dataset.
dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron.indexed_dataset.IndexedDataset
  blend_path: /path/to/blend.json
  split: train
  sequence_length: 4096

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron.indexed_dataset.IndexedDataset
  blend_path: /path/to/blend.json
  split: valid
  sequence_length: 4096

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  shuffle: true

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 3.0e-4
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 3.0e-5
  warmup_steps: 500

wandb:
  project: ${oc.env:WANDB_PROJECT,null}
  entity: ${oc.env:WANDB_ENTITY,null}
  name: ${oc.env:WANDB_NAME,pretrain-automodel}
