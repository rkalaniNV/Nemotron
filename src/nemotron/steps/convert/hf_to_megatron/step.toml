[step]
id = "convert/hf_to_megatron"
name = "HuggingFace → Megatron Conversion"
category = "convert"
description = "Convert a HuggingFace safetensors checkpoint to Megatron distributed format."
tags = ["conversion", "checkpoint", "huggingface", "megatron"]

[[consumes]]
type = "checkpoint_hf"
description = "HuggingFace safetensors checkpoint"

[[produces]]
type = "checkpoint_megatron"
description = "Megatron distributed checkpoint"

[reference]
script = "https://github.com/NVIDIA-NeMo/Megatron-Bridge/blob/main/examples/conversion/convert_checkpoints.py"
